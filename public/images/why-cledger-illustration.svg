<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Line illustration of an accountant's workspace with laptop, reports and coffee">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1730"/>
      <stop offset="1" stop-color="#0B1222"/>
    </linearGradient>
    <pattern id="grid2" width="80" height="56" patternUnits="userSpaceOnUse">
      <path d="M0 55.5 H80" stroke="#FFFFFF" stroke-opacity="0.035" stroke-width="1"/>
      <path d="M79.5 0 V56" stroke="#FFFFFF" stroke-opacity="0.022" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="1000" fill="url(#panel)"/>
  <rect width="800" height="1000" fill="url(#grid2)"/>

  <!-- Ledger margin rule -->
  <line x1="64" y1="0" x2="64" y2="1000" stroke="#C9A84C" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- Frame corner accents -->
  <g stroke="#C9A84C" stroke-opacity="0.5" stroke-width="2" fill="none">
    <path d="M40 88 V40 H88"/>
    <path d="M712 40 H760 V88"/>
    <path d="M760 912 V960 H712"/>
    <path d="M88 960 H40 V912"/>
  </g>

  <!-- Desk surface -->
  <line x1="90" y1="720" x2="710" y2="720" stroke="#C9A84C" stroke-opacity="0.55" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="120" y1="746" x2="680" y2="746" stroke="#C9A84C" stroke-opacity="0.15" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Laptop -->
  <g stroke="#C9A84C" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="200" y="380" width="320" height="220" rx="12" stroke-opacity="0.9"/>
    <path d="M170 600 H550 L580 668 C582 678 576 686 566 686 H184 C174 686 168 678 170 668 Z" stroke-opacity="0.9"/>
    <line x1="330" y1="640" x2="420" y2="640" stroke-opacity="0.5"/>
  </g>
  <!-- Screen: ascending bars + trend -->
  <g>
    <rect x="232" y="520" width="36" height="48" rx="3" fill="#C9A84C" fill-opacity="0.18" stroke="#C9A84C" stroke-opacity="0.6" stroke-width="1.5"/>
    <rect x="288" y="488" width="36" height="80" rx="3" fill="#C9A84C" fill-opacity="0.24" stroke="#C9A84C" stroke-opacity="0.6" stroke-width="1.5"/>
    <rect x="344" y="500" width="36" height="68" rx="3" fill="#C9A84C" fill-opacity="0.20" stroke="#C9A84C" stroke-opacity="0.6" stroke-width="1.5"/>
    <rect x="400" y="452" width="36" height="116" rx="3" fill="#C9A84C" fill-opacity="0.32" stroke="#C9A84C" stroke-opacity="0.7" stroke-width="1.5"/>
    <path d="M236 500 L306 462 L362 472 L432 416" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="432" cy="416" r="4" fill="#FFFFFF" fill-opacity="0.7"/>
    <line x1="232" y1="424" x2="300" y2="424" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="3" stroke-linecap="round"/>
    <line x1="232" y1="408" x2="268" y2="408" stroke="#C9A84C" stroke-opacity="0.6" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Stack of reports -->
  <g stroke="#C9A84C" stroke-width="2" fill="#0B1222" stroke-linejoin="round">
    <rect x="556" y="560" width="150" height="44" rx="6" stroke-opacity="0.45"/>
    <rect x="548" y="588" width="166" height="48" rx="6" stroke-opacity="0.65"/>
    <rect x="540" y="618" width="182" height="102" rx="8" stroke-opacity="0.9"/>
  </g>
  <g stroke="#C9A84C" stroke-linecap="round">
    <line x1="562" y1="648" x2="640" y2="648" stroke-width="3" stroke-opacity="0.7"/>
    <line x1="562" y1="670" x2="700" y2="670" stroke-width="2" stroke-opacity="0.35"/>
    <line x1="562" y1="688" x2="700" y2="688" stroke-width="2" stroke-opacity="0.35"/>
  </g>
  <!-- Gold tick on the top report -->
  <circle cx="688" cy="644" r="13" fill="none" stroke="#C9A84C" stroke-opacity="0.8" stroke-width="2"/>
  <path d="M682 644 L686.5 649 L695 638" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Coffee -->
  <g stroke="#C9A84C" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M104 656 H180 L172 716 C171 722 166 726 160 726 H124 C118 726 113 722 112 716 Z" stroke-opacity="0.9"/>
    <path d="M180 666 C204 666 204 698 178 700" stroke-opacity="0.9"/>
    <path d="M126 636 C122 626 130 622 126 612" stroke-opacity="0.45"/>
    <path d="M146 632 C142 620 152 616 148 604" stroke-opacity="0.45"/>
  </g>

  <!-- Pen -->
  <g stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M300 770 L420 770" stroke-opacity="0.8"/>
    <path d="M420 770 L438 770 L448 765 L438 760 L420 760 Z" stroke-opacity="0.8" fill="#C9A84C" fill-opacity="0.25"/>
    <path d="M300 770 L300 760 L420 760" stroke-opacity="0.8"/>
  </g>

  <!-- Floating figures: pound + percent -->
  <g fill="none" stroke="#C9A84C" stroke-linecap="round" stroke-width="2">
    <path d="M610 300 C610 286 632 284 632 300 C632 312 612 318 610 332 H636" stroke-opacity="0.5"/>
    <line x1="604" y1="316" x2="630" y2="316" stroke-opacity="0.5"/>
    <circle cx="158" cy="320" r="9" stroke-opacity="0.4"/>
    <circle cx="206" cy="368" r="9" stroke-opacity="0.4"/>
    <line x1="148" y1="382" x2="216" y2="306" stroke-opacity="0.4"/>
  </g>

  <!-- Bottom gold baseline -->
  <rect x="64" y="952" width="120" height="4" fill="#C9A84C" fill-opacity="0.85"/>
</svg>
