<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Line illustration of a reviewed ledger sheet with a gold approval seal and fountain pen">
  <defs>
    <linearGradient id="panel3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1730"/>
      <stop offset="1" stop-color="#0B1222"/>
    </linearGradient>
    <pattern id="grid3" width="80" height="56" patternUnits="userSpaceOnUse">
      <path d="M0 55.5 H80" stroke="#FFFFFF" stroke-opacity="0.035" stroke-width="1"/>
      <path d="M79.5 0 V56" stroke="#FFFFFF" stroke-opacity="0.022" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="1000" fill="url(#panel3)"/>
  <rect width="800" height="1000" fill="url(#grid3)"/>

  <!-- Ledger margin rule -->
  <line x1="64" y1="0" x2="64" y2="1000" stroke="#C9A84C" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- Frame corner accents -->
  <g stroke="#C9A84C" stroke-opacity="0.5" stroke-width="2" fill="none">
    <path d="M40 88 V40 H88"/>
    <path d="M712 40 H760 V88"/>
    <path d="M760 912 V960 H712"/>
    <path d="M88 960 H40 V912"/>
  </g>

  <!-- Sheet behind (depth) -->
  <g transform="rotate(3 400 500)">
    <rect x="180" y="180" width="440" height="600" rx="10" fill="#0C1528" stroke="#C9A84C" stroke-opacity="0.18" stroke-width="1.5"/>
  </g>

  <!-- Main ledger sheet -->
  <g transform="rotate(-3 400 500)">
    <rect x="160" y="150" width="460" height="630" rx="10" fill="#101B33" stroke="#C9A84C" stroke-opacity="0.7" stroke-width="2"/>

    <!-- Header -->
    <line x1="196" y1="216" x2="430" y2="216" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="5" stroke-linecap="round"/>
    <line x1="196" y1="240" x2="340" y2="240" stroke="#C9A84C" stroke-opacity="0.55" stroke-width="3" stroke-linecap="round"/>
    <line x1="160" y1="272" x2="620" y2="272" stroke="#C9A84C" stroke-opacity="0.45" stroke-width="1.5"/>

    <!-- Column rules: description | debit | credit -->
    <line x1="404" y1="272" x2="404" y2="700" stroke="#C9A84C" stroke-opacity="0.22" stroke-width="1.5"/>
    <line x1="512" y1="272" x2="512" y2="700" stroke="#C9A84C" stroke-opacity="0.22" stroke-width="1.5"/>

    <!-- Rows -->
    <g stroke-linecap="round">
      <line x1="196" y1="312" x2="372" y2="312" stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="3"/>
      <line x1="430" y1="312" x2="488" y2="312" stroke="#C9A84C" stroke-opacity="0.45" stroke-width="3"/>
      <line x1="196" y1="356" x2="340" y2="356" stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="3"/>
      <line x1="538" y1="356" x2="596" y2="356" stroke="#C9A84C" stroke-opacity="0.45" stroke-width="3"/>
      <line x1="196" y1="400" x2="384" y2="400" stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="3"/>
      <line x1="430" y1="400" x2="476" y2="400" stroke="#C9A84C" stroke-opacity="0.45" stroke-width="3"/>
      <line x1="196" y1="444" x2="352" y2="444" stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="3"/>
      <line x1="538" y1="444" x2="584" y2="444" stroke="#C9A84C" stroke-opacity="0.45" stroke-width="3"/>
      <line x1="196" y1="488" x2="368" y2="488" stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="3"/>
      <line x1="430" y1="488" x2="492" y2="488" stroke="#C9A84C" stroke-opacity="0.45" stroke-width="3"/>
      <line x1="196" y1="532" x2="330" y2="532" stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="3"/>
      <line x1="538" y1="532" x2="590" y2="532" stroke="#C9A84C" stroke-opacity="0.45" stroke-width="3"/>
    </g>

    <!-- Totals: double rule, balanced -->
    <line x1="160" y1="576" x2="620" y2="576" stroke="#C9A84C" stroke-opacity="0.5" stroke-width="1.5"/>
    <line x1="430" y1="604" x2="492" y2="604" stroke="#C9A84C" stroke-opacity="0.85" stroke-width="4" stroke-linecap="round"/>
    <line x1="538" y1="604" x2="600" y2="604" stroke="#C9A84C" stroke-opacity="0.85" stroke-width="4" stroke-linecap="round"/>
    <g stroke="#C9A84C" stroke-opacity="0.6" stroke-width="1.5">
      <line x1="430" y1="622" x2="492" y2="622"/>
      <line x1="430" y1="628" x2="492" y2="628"/>
      <line x1="538" y1="622" x2="600" y2="622"/>
      <line x1="538" y1="628" x2="600" y2="628"/>
    </g>
  </g>

  <!-- Review seal -->
  <g transform="rotate(-10 560 700)">
    <circle cx="560" cy="700" r="64" fill="#0B1222" fill-opacity="0.55" stroke="#C9A84C" stroke-width="2.5"/>
    <circle cx="560" cy="700" r="52" fill="none" stroke="#C9A84C" stroke-opacity="0.55" stroke-width="1.5" stroke-dasharray="3 5"/>
    <path d="M538 700 L554 717 L586 681" fill="none" stroke="#C9A84C" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Fountain pen -->
  <g transform="rotate(32 300 820)" stroke="#C9A84C" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <rect x="200" y="806" width="170" height="26" rx="13" stroke-width="2.5" stroke-opacity="0.9"/>
    <path d="M370 810 L412 814 L424 819 L412 824 L370 828" stroke-width="2.5" stroke-opacity="0.9" fill="#C9A84C" fill-opacity="0.22"/>
    <line x1="412" y1="814" x2="412" y2="824" stroke-width="1.5" stroke-opacity="0.7"/>
    <line x1="232" y1="806" x2="232" y2="832" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>

  <!-- Floating pound sign -->
  <g fill="none" stroke="#C9A84C" stroke-linecap="round" stroke-width="2.5" stroke-opacity="0.45">
    <path d="M664 252 C664 234 692 232 692 252 C692 268 666 274 664 292 H698"/>
    <line x1="656" y1="272" x2="690" y2="272"/>
  </g>

  <!-- Bottom gold baseline -->
  <rect x="64" y="952" width="120" height="4" fill="#C9A84C" fill-opacity="0.85"/>
</svg>
