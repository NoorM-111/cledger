<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1222"/>
      <stop offset="100%" style="stop-color:#131d31"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Gold ledger rules -->
  <rect x="0" y="0" width="6" height="630" fill="#C9A84C" opacity="0.9"/>
  <rect x="0" y="580" width="1200" height="1" fill="#C9A84C" opacity="0.35"/>
  <rect x="0" y="560" width="1200" height="1" fill="#C9A84C" opacity="0.15"/>

  <!-- Wordmark -->
  <text x="80" y="190" font-family="Georgia, serif" font-size="96" font-weight="700" fill="#F8F5EE" letter-spacing="-2">Cledger</text>
  <text x="654" y="190" font-family="Georgia, serif" font-size="96" font-weight="700" fill="#C9A84C">.</text>

  <!-- Tagline -->
  <text x="80" y="280" font-family="Georgia, serif" font-size="38" font-style="italic" fill="#C9A84C" letter-spacing="0.5">Clear books. Clear numbers. Clear future.</text>

  <!-- Divider rule -->
  <rect x="80" y="316" width="360" height="2" fill="#C9A84C" opacity="0.4"/>

  <!-- Subtext -->
  <text x="80" y="375" font-family="Arial, sans-serif" font-size="24" fill="#8a94a8" letter-spacing="0.5">Online accounting for UK small businesses</text>
  <text x="80" y="415" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.35)">Qualified accountants · From £175/month · MTD compliant</text>

  <!-- URL -->
  <text x="80" y="600" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.25)">www.cledger.co.uk</text>
</svg>
